<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Checkout · estiloartesanal.emma</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--white:#fff;--off:#f8f6f2;--sage:#8fa882;--sage-lt:#edf2e9;--sage-dk:#5a7050;--terra:#b07355;--clay:#d4a882;--sand:#ede5d8;--dark:#1c1a17;--muted:#7a756e;--border:#e8e2d8;--r:12px;--font-d:'Cormorant Garamond',serif;--font-b:'Jost',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-b);background:var(--off);color:var(--dark);line-height:1.6;min-height:100vh;}
img{display:block;max-width:100%;}

header{background:var(--white);border-bottom:1px solid var(--border);}
.hdr{max-width:960px;margin:0 auto;padding:.9rem 28px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;}
.logo-text .ln{font-family:var(--font-d);font-size:1.05rem;color:var(--dark);}
.logo-text .ls{font-size:.56rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:block;}
.step-bar{display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--muted);}
.step{display:flex;align-items:center;gap:.4rem;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;color:var(--muted);}
.step.active .step-num{background:var(--sage);color:var(--white);}
.step.active span{color:var(--dark);font-weight:500;}
.step-line{width:30px;height:1px;background:var(--border);}

/* BACK */
.back-row{max-width:960px;margin:0 auto;padding:1.2rem 28px .4rem;}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.74rem;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;border:none;transition:color .2s;}
.back-btn:hover{color:var(--sage-dk);}
.back-btn svg{width:13px;height:13px;}

/* GRID */
.ck-wrap{max-width:960px;margin:0 auto;padding:16px 28px 60px;}
.ck-grid{display:grid;grid-template-columns:1fr 380px;gap:28px;align-items:start;}

/* FORM CARD */
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:2rem 2.2rem;margin-bottom:1.4rem;}
.card h2{font-family:var(--font-d);font-size:1.6rem;font-weight:300;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--off);}
.card h2 em{font-style:italic;color:var(--terra);}
.fg{margin-bottom:1rem;}
.fg label{font-size:.68rem;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.35rem;}
.fg input,.fg textarea{width:100%;padding:.72rem 1rem;border:1.5px solid var(--border);border-radius:var(--r);font-size:.88rem;font-family:var(--font-b);background:var(--white);color:var(--dark);outline:none;transition:border-color .2s;}
.fg input:focus,.fg textarea:focus,.fg input:hover{border-color:var(--sage);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

/* SUMMARY SIDEBAR */
.summary{background:var(--white);border-radius:16px;border:1px solid var(--border);overflow:hidden;position:sticky;top:80px;}
.sum-head{background:var(--off);padding:1.3rem 1.6rem;border-bottom:1px solid var(--border);}
.sum-head h3{font-family:var(--font-d);font-size:1.3rem;font-weight:400;}
.sum-body{padding:1.5rem 1.6rem;}
.sum-prod{display:flex;gap:1rem;align-items:center;margin-bottom:1.4rem;}
.sum-img{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;border:1px solid var(--border);}
.sum-pname{font-size:.9rem;font-weight:500;margin-bottom:.2rem;line-height:1.3;}
.sum-pcat{font-size:.74rem;color:var(--muted);}
.sum-hr{border:none;border-top:1px solid var(--off);margin:.9rem 0;}
.sum-row{display:flex;justify-content:space-between;font-size:.83rem;color:var(--muted);margin-bottom:.35rem;}
.sum-total{display:flex;justify-content:space-between;font-size:1.05rem;font-weight:500;color:var(--dark);margin-top:.5rem;}
.sum-total strong{font-family:var(--font-d);font-size:1.4rem;}
.sum-note{font-size:.74rem;color:var(--muted);background:var(--off);border-radius:8px;padding:.65rem .8rem;margin-top:.9rem;display:flex;align-items:flex-start;gap:.4rem;line-height:1.5;}
.sum-note svg{width:12px;height:12px;flex-shrink:0;margin-top:2px;color:var(--clay);}

/* PAY SECTION */
.pay-card{background:var(--white);border-radius:16px;border:1px solid var(--border);padding:2rem 2.2rem;}
.pay-card h2{font-family:var(--font-d);font-size:1.6rem;font-weight:300;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--off);}
.pay-card h2 em{font-style:italic;color:var(--terra);}
.pay-opts{display:flex;flex-direction:column;gap:.9rem;}
.pay-opt{display:flex;align-items:center;gap:1rem;padding:1rem 1.2rem;border:1.5px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .2s;background:var(--white);}
.pay-opt:hover,.pay-opt.sel{border-color:var(--sage);background:var(--sage-lt);}
.pay-opt svg{width:22px;height:22px;flex-shrink:0;}
.pay-opt-text strong{display:block;font-size:.86rem;font-weight:500;margin-bottom:.1rem;}
.pay-opt-text span{font-size:.74rem;color:var(--muted);}
.pay-sep{text-align:center;font-size:.74rem;color:var(--muted);position:relative;margin:.3rem 0;}
.pay-sep::before,.pay-sep::after{content:'';position:absolute;top:50%;width:44%;height:1px;background:var(--border);}
.pay-sep::before{left:0;}.pay-sep::after{right:0;}

/* SUBMIT */
.btn{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--font-b);font-size:.8rem;font-weight:400;letter-spacing:.7px;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:all .2s;}
.btn:hover{transform:translateY(-2px);}
.btn-dark{background:var(--dark);color:var(--white);padding:.88rem 2rem;}
.btn-dark:hover{background:var(--sage-dk);}
.btn-mp{background:#009ee3;color:var(--white);padding:.88rem 2rem;width:100%;justify-content:center;margin-top:1.2rem;}
.btn-mp:hover{background:#007fc5;}
.btn-ig{background:var(--off);color:var(--dark);padding:.88rem 2rem;width:100%;justify-content:center;border:1.5px solid var(--border);}
.btn-ig:hover{border-color:var(--sage);color:var(--sage-dk);}
.btn svg{width:14px;height:14px;}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.secure-row{display:flex;align-items:center;justify-content:center;gap:.4rem;font-size:.72rem;color:var(--muted);margin-top:.8rem;}
.secure-row svg{width:11px;height:11px;}

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinning{animation:spin 1s linear infinite;}

@media(max-width:780px){
  .ck-grid{grid-template-columns:1fr;}
  .summary{position:static;}
  .fg-row{grid-template-columns:1fr;}
}
@media(max-width:500px){
  .step-bar{display:none;}
  .hdr{justify-content:center;}
}
</style>
</head>
<body>

<header>
<div class="hdr">
  <a class="logo" href="index.html">
    <svg width="32" height="32" viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="none" stroke="#d4a882" stroke-width="1.2"/><circle cx="18" cy="18" r="13.5" fill="none" stroke="#e8e2d8" stroke-width=".6" stroke-dasharray="2.5 3.5"/><text x="18" y="23.5" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="18" fill="#b07355" font-style="italic">E</text></svg>
    <div class="logo-text"><span class="ln">estiloartesanal.emma</span><span class="ls">checkout seguro</span></div>
  </a>
  <div class="step-bar">
    <div class="step"><div class="step-num">1</div><span>Producto</span></div>
    <div class="step-line"></div>
    <div class="step active"><div class="step-num">2</div><span>Tus datos</span></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-num">3</div><span>Pago</span></div>
  </div>
</div>
</header>

<div class="back-row">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Volver al producto
  </button>
</div>

<div class="ck-wrap">
<div class="ck-grid">

  <!-- FORM -->
  <div>
    <div class="card">
      <h2>Tus <em>datos</em></h2>
      <div class="fg-row">
        <div class="fg"><label>Nombre *</label><input id="ch-nom" type="text" placeholder="María" required/></div>
        <div class="fg"><label>Apellido *</label><input id="ch-ape" type="text" placeholder="González" required/></div>
      </div>
      <div class="fg"><label>Email *</label><input id="ch-email" type="email" placeholder="maria@email.com" required/></div>
      <div class="fg"><label>Teléfono / WhatsApp</label><input id="ch-tel" type="tel" placeholder="+54 9 221 000-0000"/></div>
      <div class="fg"><label>Nota para el pedido (opcional)</label><textarea id="ch-nota" rows="2" placeholder="Ej: es para regalo, preferencia de aroma, etc."></textarea></div>
    </div>

    <div class="pay-card">
      <h2>Forma de <em>pago</em></h2>
      <button class="btn btn-mp" id="btn-mp" onclick="pagarMP()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/><path d="M9 7h6"/></svg>
        Pagar con Mercado Pago
      </button>
      <div class="pay-sep" style="margin:.9rem 0;">o</div>
      <button class="btn btn-ig" onclick="coordinarIG()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        Coordinar por Instagram
      </button>
      <p class="secure-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Tus datos están protegidos · Pago 100% seguro
      </p>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="summary">
    <div class="sum-head"><h3>Resumen del pedido</h3></div>
    <div class="sum-body" id="sum-body">
      <p style="font-size:.85rem;color:var(--muted);">Cargando producto...</p>
    </div>
  </div>

</div>
</div>

<script>
const BACKEND = "https://estiloartesanal-emma.onrender.com";

const CATALOG = {
  'jabon-lavanda':{cat:'Jabones',name:'Jabón de Lavanda',price:'$4.800',priceNum:4800,img:'assets/images/jabon-lavanda.jpg',fallback:'https://images.unsplash.com/photo-1607006332611-ff950d0bf067?q=85&w=300&auto=format&fit=crop'},
  'jabon-citrico':{cat:'Jabones',name:'Jabón Cítrico',price:'$4.800',priceNum:4800,img:'assets/images/jabon-citrico.jpg',fallback:'https://images.unsplash.com/photo-1556228578-dd539282b964?q=85&w=300&auto=format&fit=crop'},
  'jabon-romero':{cat:'Jabones',name:'Jabón de Romero',price:'$4.800',priceNum:4800,img:'assets/images/velas.jpg',fallback:'https://images.unsplash.com/photo-1612817288484-6f916006741a?q=85&w=300&auto=format&fit=crop'},
  'ceramica':{cat:'Cerámica',name:'Piezas de cerámica esmaltadas',price:'$12.500',priceNum:12500,img:'assets/images/ceramica.jpg',fallback:'https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?q=85&w=300&auto=format&fit=crop'},
  'deco':{cat:'Decoración',name:'Objetos decorativos de hogar',price:'$3.200',priceNum:3200,img:'assets/images/deco.jpg',fallback:'https://images.unsplash.com/photo-1588515724527-074a7a56616c?q=85&w=300&auto=format&fit=crop'},
};

let prod = null;

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

function init(){
  const id = getParam('id');
  prod = CATALOG[id];
  if(!prod){ window.location.href='index.html'; return; }

  document.title = 'Checkout: '+prod.name+' · estiloartesanal.emma';

  document.getElementById('sum-body').innerHTML = `
    <div class="sum-prod">
      <img class="sum-img" src="${prod.img}" onerror="this.src='${prod.fallback}'" alt="${prod.name}"/>
      <div>
        <p class="sum-pname">${prod.name}</p>
        <p class="sum-pcat">${prod.cat}</p>
      </div>
    </div>
    <div class="sum-hr"></div>
    <div class="sum-row"><span>Subtotal</span><span>${prod.price}</span></div>
    <div class="sum-row"><span>Envío</span><span style="color:var(--sage)">Retiro gratis</span></div>
    <div class="sum-hr"></div>
    <div class="sum-total"><span>Total</span><strong>${prod.price}</strong></div>
    <div class="sum-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Retiro personal · Calle 43 N° 4364, La Plata · Con cita previa por Instagram
    </div>
  `;
}

function validar(){
  const nom   = document.getElementById('ch-nom').value.trim();
  const email = document.getElementById('ch-email').value.trim();
  if(!nom){  alert('Por favor ingresá tu nombre.'); document.getElementById('ch-nom').focus(); return false; }
  if(!email){ alert('Por favor ingresá tu email.'); document.getElementById('ch-email').focus(); return false; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert('El email no parece válido.'); document.getElementById('ch-email').focus(); return false; }
  return true;
}

async function pagarMP(){
  if(!validar()) return;

  const btn = document.getElementById('btn-mp');
  btn.disabled = true;
  btn.innerHTML = `<svg class="spinning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Conectando...`;

  const body = {
    producto: prod.name,
    precio:   prod.priceNum,
    nombre:   (document.getElementById('ch-nom').value+' '+document.getElementById('ch-ape').value).trim(),
    email:    document.getElementById('ch-email').value.trim(),
    telefono: document.getElementById('ch-tel').value.trim(),
    nota:     document.getElementById('ch-nota').value.trim(),
  };

  try {
    const resp = await fetch(`${BACKEND}/crear-preferencia`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    if(!resp.ok){ const e=await resp.json(); throw new Error(e.error||'Error del servidor'); }
    const data = await resp.json();
    window.location.href = data.init_point; // cambiá a sandbox_init_point para test
  } catch(err){
    alert('No se pudo conectar con Mercado Pago:\n'+err.message+'\n\nVerificá que el servidor en Render esté activo.');
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:15px;height:15px;"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg> Pagar con Mercado Pago`;
  }
}

function coordinarIG(){
  if(!validar()) return;
  // Guardar datos en sessionStorage para la página de éxito
  sessionStorage.setItem('pedido', JSON.stringify({
    nombre: document.getElementById('ch-nom').value.trim(),
    producto: prod.name,
    precio: prod.price,
    metodo: 'instagram',
  }));
  window.location.href = 'confirmacion.html?via=ig';
}

init();
</script>
</body>
</html>
