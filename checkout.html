<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>"/>
<title>Checkout · estiloartesanal.emma</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#e8e0d8;--bg-lt:#f5efe8;
  --sd:#c4bcb4;--sl:#ffffff;
  --pink:#E8C1C7;--pink-dk:#8a4f58;--pink-md:#c89aa8;--pink-lt:#f5dde0;
  --ink:#3a2a2e;--muted:#9a8880;--clay:#c8956a;
  --serif:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;
  --nm:8px 8px 20px var(--sd),-8px -8px 20px var(--sl);
  --nm-in:inset 5px 5px 14px var(--sd),inset -5px -5px 14px var(--sl);
  --nm-sm:4px 4px 10px var(--sd),-4px -4px 10px var(--sl);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;}
img{display:block;max-width:100%;}
a{text-decoration:none;color:inherit;}

/* HEADER */
header{background:rgba(232,224,216,.97);backdrop-filter:blur(14px);box-shadow:0 4px 14px var(--sd);}
.hdr{max-width:980px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-wrap{width:44px;height:44px;border-radius:50%;background:var(--bg);box-shadow:var(--nm-sm);display:flex;align-items:center;justify-content:center;}
.logo-wrap svg{width:30px;height:30px;}
.logo-text span{font-family:var(--serif);font-size:.9rem;font-style:italic;color:var(--ink);display:block;}
.logo-text small{font-size:.48rem;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

/* STEP BAR */
.step-bar{display:flex;align-items:center;gap:.5rem;font-size:.7rem;color:var(--muted);}
.step{display:flex;align-items:center;gap:.4rem;}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--bg);box-shadow:var(--nm-sm);display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:500;color:var(--muted);}
.step.active .step-num{box-shadow:var(--nm-in);color:var(--pink-dk);}
.step.active span{color:var(--ink);font-weight:500;}
.step-line{width:28px;height:1px;background:var(--sd);}

/* BACK */
.back-row{max-width:980px;margin:0 auto;padding:1.2rem 32px .4rem;}
.back-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.7rem;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);cursor:pointer;background:var(--bg);border:none;border-radius:50px;padding:.4rem .9rem;box-shadow:var(--nm-sm);transition:all .22s;}
.back-btn:hover{box-shadow:var(--nm-in);color:var(--pink-dk);}
.back-btn svg{width:13px;height:13px;}

/* GRID */
.ck-wrap{max-width:980px;margin:0 auto;padding:16px 32px 60px;}
.ck-grid{display:grid;grid-template-columns:1fr 360px;gap:24px;align-items:start;}

/* CARD */
.card{background:var(--bg);border-radius:20px;box-shadow:var(--nm);padding:2rem 2.2rem;margin-bottom:1.4rem;}
.card h2{font-family:var(--serif);font-size:1.6rem;font-weight:300;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--sd);}
.card h2 em{font-style:italic;color:var(--clay);}

.fg{margin-bottom:1rem;}
.fg label{font-size:.65rem;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:.4rem;}
.fg input,.fg textarea{
  width:100%;padding:.75rem 1rem;border:none;border-radius:12px;
  font-size:.86rem;font-family:var(--sans);
  background:var(--bg);color:var(--ink);outline:none;
  box-shadow:var(--nm-in);
  transition:box-shadow .2s;
}
.fg input:focus,.fg textarea:focus{box-shadow:inset 6px 6px 16px var(--sd),inset -6px -6px 16px var(--sl);}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}

/* PAYMENT CARD */
.pay-card{background:var(--bg);border-radius:20px;box-shadow:var(--nm);padding:2rem 2.2rem;}
.pay-card h2{font-family:var(--serif);font-size:1.6rem;font-weight:300;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--sd);}
.pay-card h2 em{font-style:italic;color:var(--clay);}

.pay-sep{text-align:center;font-size:.72rem;color:var(--muted);margin:.6rem 0;position:relative;}
.pay-sep::before,.pay-sep::after{content:'';position:absolute;top:50%;width:43%;height:1px;background:var(--sd);}
.pay-sep::before{left:0;}.pay-sep::after{right:0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;font-family:var(--sans);font-size:.72rem;font-weight:400;letter-spacing:1.2px;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:all .22s;width:100%;padding:.9rem 2rem;}
.btn:disabled{opacity:.6;cursor:not-allowed;}
.btn-mp{background:#009ee3;color:#fff;box-shadow:4px 4px 10px rgba(0,158,227,.3);margin-top:1rem;}
.btn-mp:hover:not(:disabled){background:#007fc5;transform:translateY(-2px);}
.btn-ig{background:var(--bg);color:var(--ink);box-shadow:var(--nm-sm);}
.btn-ig:hover{box-shadow:var(--nm-in);color:var(--pink-dk);}
.btn svg{width:14px;height:14px;}

.secure-row{display:flex;align-items:center;justify-content:center;gap:.4rem;font-size:.7rem;color:var(--muted);margin-top:.9rem;}
.secure-row svg{width:11px;height:11px;}

/* SUMMARY */
.summary{background:var(--bg);border-radius:20px;box-shadow:var(--nm);overflow:hidden;position:sticky;top:84px;}
.sum-head{background:var(--bg-lt);padding:1.2rem 1.6rem;box-shadow:0 3px 8px var(--sd);}
.sum-head h3{font-family:var(--serif);font-size:1.25rem;font-weight:300;}
.sum-body{padding:1.5rem 1.6rem;}
.sum-prod{display:flex;gap:1rem;align-items:center;margin-bottom:1.4rem;}
.sum-img{width:72px;height:72px;border-radius:12px;object-fit:cover;flex-shrink:0;box-shadow:var(--nm-sm);}
.sum-pname{font-size:.88rem;font-weight:500;margin-bottom:.2rem;line-height:1.3;}
.sum-pcat{font-size:.72rem;color:var(--muted);}
.sum-hr{border:none;border-top:1px solid var(--sd);margin:.8rem 0;}
.sum-row{display:flex;justify-content:space-between;font-size:.82rem;color:var(--muted);margin-bottom:.3rem;}
.sum-total{display:flex;justify-content:space-between;font-size:1rem;font-weight:500;color:var(--ink);margin-top:.5rem;}
.sum-total strong{font-family:var(--serif);font-size:1.4rem;}
.sum-note{font-size:.72rem;color:var(--muted);background:var(--bg-lt);border-radius:10px;padding:.65rem .9rem;margin-top:.9rem;box-shadow:var(--nm-in);display:flex;align-items:flex-start;gap:.5rem;line-height:1.55;}
.sum-note svg{width:12px;height:12px;flex-shrink:0;margin-top:2px;color:var(--pink-md);}

@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spinning{animation:spin 1s linear infinite;}

@media(max-width:780px){.ck-grid{grid-template-columns:1fr;}.summary{position:static;}.fg-row{grid-template-columns:1fr;}}
@media(max-width:500px){.step-bar{display:none;}.hdr{justify-content:center;}}
</style>
</head>
<body>

<header>
<div class="hdr">
  <a class="logo" href="index.html">
    <div class="logo-wrap">
      <svg width="30" height="30" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <style>.em-c{font-family:'Cormorant Garamond',serif;font-size:140px;font-style:italic;font-weight:300;fill:#8a4f58;}.rt-c{font-family:'Jost',sans-serif;font-size:22px;font-weight:300;fill:#7a6a6e;letter-spacing:3px;}.rb-c{font-family:'Jost',sans-serif;font-size:19px;font-weight:300;fill:#9a8880;letter-spacing:2px;}</style>
        <path id="aTc" d="M 30,150 A 120,120 0 0,1 270,150" fill="none"/>
        <text class="rt-c"><textPath href="#aTc" startOffset="50%" text-anchor="middle">ESTILO ARTESANAL</textPath></text>
        <path id="aBc" d="M 48,165 A 105,105 0 0,0 252,165" fill="none"/>
        <text class="rb-c"><textPath href="#aBc" startOffset="50%" text-anchor="middle">TODO HECHO A MANO</textPath></text>
        <text x="150" y="188" text-anchor="middle" class="em-c">E</text>
      </svg>
    </div>
    <div class="logo-text">
      <span>Estilo Artesanal.emma</span>
      <small>checkout seguro</small>
    </div>
  </a>
  <div class="step-bar">
    <div class="step"><div class="step-num">1</div><span>Producto</span></div>
    <div class="step-line"></div>
    <div class="step active"><div class="step-num">2</div><span>Tus datos</span></div>
    <div class="step-line"></div>
    <div class="step"><div class="step-num">3</div><span>Pago</span></div>
  </div>
</div>
</header>

<div class="back-row">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Volver al producto
  </button>
</div>

<div class="ck-wrap">
<div class="ck-grid">
  <div>
    <div class="card">
      <h2>Tus <em>datos</em></h2>
      <div class="fg-row">
        <div class="fg"><label>Nombre *</label><input id="ch-nom" type="text" placeholder="María" required/></div>
        <div class="fg"><label>Apellido *</label><input id="ch-ape" type="text" placeholder="González" required/></div>
      </div>
      <div class="fg"><label>Email *</label><input id="ch-email" type="email" placeholder="maria@email.com" required/></div>
      <div class="fg"><label>Teléfono / WhatsApp</label><input id="ch-tel" type="tel" placeholder="+54 9 221 000-0000"/></div>
      <div class="fg"><label>Nota para el pedido (opcional)</label><textarea id="ch-nota" rows="2" placeholder="Ej: es para regalo, preferencia de aroma, etc."></textarea></div>
    </div>

    <div class="pay-card">
      <h2>Forma de <em>pago</em></h2>
      <button class="btn btn-mp" id="btn-mp" onclick="pagarMP()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/><path d="M9 7h6"/></svg>
        Pagar con Mercado Pago
      </button>
      <div class="pay-sep" style="margin:.8rem 0;">o</div>
      <button class="btn btn-ig" onclick="coordinarIG()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        Coordinar por Instagram
      </button>
      <p class="secure-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Tus datos están protegidos · Pago 100% seguro
      </p>
    </div>
  </div>

  <div class="summary">
    <div class="sum-head"><h3>Resumen del pedido</h3></div>
    <div class="sum-body" id="sum-body">
      <p style="font-size:.85rem;color:var(--muted);">Cargando producto...</p>
    </div>
  </div>
</div>
</div>

<script>
const BACKEND = "https://estiloartesanal-emma.onrender.com";
const FALLBACK = "https://images.unsplash.com/photo-1599305445671-ac291c95aaa9?q=85&w=300&auto=format&fit=crop";
let prod = null;
let prodId = null;

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

async function init(){
  prodId = getParam("id");
  if(!prodId){window.location.href="index.html";return;}

  let catalog = {};
  try {
    const r = await fetch(BACKEND+"/productos.json");
    if(r.ok) catalog = await r.json();
  } catch(e) {}

  prod = catalog[prodId];
  if(!prod){window.location.href="index.html";return;}

  document.title = "Checkout: " + prod.nombre + " · estiloartesanal.emma";
  const imgSrc = prod.imagen || FALLBACK;
  const precio = prod.precio > 0 ? "$" + prod.precio.toLocaleString("es-AR") : "Consultar";
  const catLabel = {jabones:"Jabones",sahumadores:"Sahumadores",ceramica:"Cerámica",deco:"Decoración"}[prod.categoria]||prod.categoria;

  document.getElementById("sum-body").innerHTML = \`
    <div class="sum-prod">
      <img class="sum-img" src="\${imgSrc}" onerror="this.src='\${FALLBACK}'" alt="\${prod.nombre}"/>
      <div><p class="sum-pname">\${prod.nombre}</p><p class="sum-pcat">\${catLabel}</p></div>
    </div>
    <div class="sum-hr"></div>
    <div class="sum-row"><span>Subtotal</span><span>\${precio}</span></div>
    <div class="sum-row"><span>Envío</span><span style="color:var(--pink-dk)">Retiro gratis</span></div>
    <div class="sum-hr"></div>
    <div class="sum-total"><span>Total</span><strong>\${precio}</strong></div>
    <div class="sum-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Retiro personal · Calle 43 N° 4364, Colonia Caroya · Con cita previa por Instagram
    </div>\`;
}

function validar(){
  const nom = document.getElementById("ch-nom").value.trim();
  const email = document.getElementById("ch-email").value.trim();
  if(!nom){alert("Por favor ingresá tu nombre.");document.getElementById("ch-nom").focus();return false;}
  if(!email){alert("Por favor ingresá tu email.");document.getElementById("ch-email").focus();return false;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){alert("El email no parece válido.");document.getElementById("ch-email").focus();return false;}
  return true;
}

async function pagarMP(){
  if(!validar())return;
  const btn = document.getElementById("btn-mp");
  btn.disabled = true;
  btn.innerHTML = \`<svg class="spinning" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px;animation:spin 1s linear infinite;"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg> Conectando...\`;
  const body = {
    producto: prod.nombre,
    precio:   prod.precio,
    nombre:   (document.getElementById("ch-nom").value + " " + document.getElementById("ch-ape").value).trim(),
    email:    document.getElementById("ch-email").value.trim(),
    telefono: document.getElementById("ch-tel").value.trim(),
    nota:     document.getElementById("ch-nota").value.trim(),
    productoId: prodId,
  };
  try{
    const resp = await fetch(\`\${BACKEND}/crear-preferencia\`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    if(!resp.ok){const e=await resp.json();throw new Error(e.error||"Error del servidor");}
    const data = await resp.json();
    window.location.href = data.init_point;
  } catch(err){
    alert("No se pudo conectar con Mercado Pago:\n" + err.message);
    btn.disabled = false;
    btn.innerHTML = \`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:15px;height:15px;"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg> Pagar con Mercado Pago\`;
  }
}

function coordinarIG(){
  if(!validar())return;
  sessionStorage.setItem("pedido", JSON.stringify({
    nombre:   document.getElementById("ch-nom").value.trim(),
    producto: prod.nombre,
    precio:   prod.precio > 0 ? "$" + prod.precio.toLocaleString("es-AR") : "Consultar",
    metodo:   "instagram",
  }));
  window.location.href = "confirmacion.html?via=ig";
}

init();
</script>
</body>
</html>
