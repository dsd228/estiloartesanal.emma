<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>"/>
<title>Producto · estiloartesanal.emma</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#e8e0d8;--bg-lt:#f5efe8;
  --sd:#c4bcb4;--sl:#ffffff;
  --pink:#E8C1C7;--pink-dk:#8a4f58;--pink-md:#c89aa8;--pink-lt:#f5dde0;
  --ink:#3a2a2e;--muted:#9a8880;--clay:#c8956a;
  --serif:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;
  --nm:8px 8px 20px var(--sd),-8px -8px 20px var(--sl);
  --nm-in:inset 5px 5px 14px var(--sd),inset -5px -5px 14px var(--sl);
  --nm-sm:4px 4px 10px var(--sd),-4px -4px 10px var(--sl);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased;}
img{display:block;max-width:100%;}
a{text-decoration:none;color:inherit;}

/* HEADER */
header{position:sticky;top:0;z-index:200;background:rgba(232,224,216,.97);backdrop-filter:blur(14px);box-shadow:0 4px 16px var(--sd),0 -1px 0 var(--sl);}
.hdr{max-width:1160px;margin:0 auto;padding:0 40px;height:70px;display:flex;align-items:center;justify-content:space-between;gap:1rem;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-wrap{width:46px;height:46px;border-radius:50%;background:var(--bg);box-shadow:var(--nm-sm);display:flex;align-items:center;justify-content:center;}
.logo-wrap svg{width:32px;height:32px;}
.logo-text span{font-family:var(--serif);font-size:.95rem;font-style:italic;color:var(--ink);display:block;}
.logo-text small{font-size:.5rem;font-weight:300;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);}
nav a{font-size:.68rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:.4rem .9rem;border-radius:50px;transition:all .2s;}
nav a:hover{background:var(--bg);box-shadow:var(--nm-sm);color:var(--ink);}
.btn-back{font-size:.65rem;font-weight:400;letter-spacing:1.5px;text-transform:uppercase;padding:.58rem 1.4rem;border-radius:50px;border:none;background:var(--bg);color:var(--ink);box-shadow:var(--nm-sm);cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:all .22s;}
.btn-back:hover{box-shadow:var(--nm-in);color:var(--pink-dk);}
.btn-back svg{width:13px;height:13px;}

/* BREADCRUMB */
.breadcrumb{max-width:1160px;margin:0 auto;padding:1.4rem 40px .4rem;display:flex;align-items:center;gap:.5rem;font-size:.72rem;color:var(--muted);}
.breadcrumb a{color:var(--muted);transition:color .2s;}
.breadcrumb a:hover{color:var(--pink-dk);}
.breadcrumb svg{width:10px;height:10px;}

/* MAIN GRID */
.prod-wrap{max-width:1160px;margin:0 auto;padding:20px 40px 80px;}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;}

/* IMAGE */
.img-main{width:100%;height:520px;object-fit:cover;border-radius:24px;box-shadow:var(--nm);}
.img-thumbs{display:flex;gap:.7rem;margin-top:1rem;}
.thumb{width:72px;height:72px;border-radius:12px;object-fit:cover;cursor:pointer;box-shadow:var(--nm-sm);transition:box-shadow .2s;opacity:.7;}
.thumb.active,.thumb:hover{box-shadow:var(--nm-in);opacity:1;}

/* INFO */
.eyebrow{font-size:.63rem;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--pink-dk);margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;}
.eyebrow::before{content:'';width:20px;height:2px;border-radius:1px;background:var(--pink-md);}
.prod-title{font-family:var(--serif);font-size:clamp(2.2rem,4vw,3rem);font-weight:300;line-height:1.08;margin-bottom:.7rem;}
.prod-price{font-family:var(--serif);font-size:2rem;font-weight:400;color:var(--clay);margin-bottom:1.4rem;}
.prod-price small{font-family:var(--sans);font-size:.72rem;color:var(--muted);}
.prod-desc{font-size:.9rem;color:var(--muted);line-height:1.9;margin-bottom:1.8rem;}

.block-title{font-size:.63rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}
.block-title svg{width:11px;height:11px;}

.chips{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.8rem;}
.ingr-chip{font-size:.72rem;background:var(--bg);color:var(--pink-dk);padding:.24rem .8rem;border-radius:50px;box-shadow:var(--nm-sm);}

.props-list{margin-bottom:2rem;display:flex;flex-direction:column;gap:.5rem;}
.prop-row{
  display:flex;align-items:center;gap:.75rem;
  padding:.75rem 1rem;border-radius:12px;
  background:var(--bg);box-shadow:var(--nm-sm);
  font-size:.85rem;transition:box-shadow .2s;
}
.prop-row:hover{box-shadow:var(--nm-in);}
.prop-row svg{width:14px;height:14px;color:var(--pink-dk);flex-shrink:0;}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1rem;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;font-family:var(--sans);font-size:.72rem;font-weight:400;letter-spacing:1.2px;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:all .22s;width:100%;padding:.9rem 2rem;}
.btn-buy{background:var(--ink);color:#fff;box-shadow:4px 4px 10px rgba(0,0,0,.25),-2px -2px 8px rgba(255,255,255,.1);}
.btn-buy:hover{background:var(--pink-dk);transform:translateY(-2px);}
.btn-mp{background:#009ee3;color:#fff;box-shadow:4px 4px 10px rgba(0,158,227,.3);}
.btn-mp:hover{background:#007fc5;transform:translateY(-2px);}
.btn svg{width:14px;height:14px;}

.pickup-note{display:flex;align-items:center;gap:.4rem;font-size:.74rem;color:var(--muted);margin-top:.4rem;}
.pickup-note svg{width:11px;height:11px;color:var(--pink-md);flex-shrink:0;}

/* RELATED */
.related{background:var(--bg-lt);padding:70px 0;margin-top:40px;box-shadow:inset 0 4px 16px var(--sd),inset 0 -4px 16px var(--sl);}
.rel-inner{max-width:1160px;margin:0 auto;padding:0 40px;}
.rel-eyebrow{font-size:.63rem;letter-spacing:3px;text-transform:uppercase;color:var(--pink-dk);margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem;}
.rel-eyebrow::before{content:'';width:20px;height:2px;border-radius:1px;background:var(--pink-md);}
.rel-title{font-family:var(--serif);font-size:2rem;font-weight:300;margin-bottom:2rem;}
.rel-title em{font-style:italic;color:var(--clay);}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;}
.rel-card{
  background:var(--bg);border-radius:18px;
  box-shadow:var(--nm);overflow:hidden;
  cursor:pointer;transition:box-shadow .3s,transform .3s;display:block;
}
.rel-card:hover{box-shadow:var(--nm-in);transform:translateY(-5px);}
.rel-img{width:100%;height:200px;object-fit:cover;}
.rel-body{padding:1rem 1.2rem 1.3rem;}
.rel-cat{font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink-dk);margin-bottom:.2rem;}
.rel-name{font-family:var(--serif);font-size:1.25rem;font-weight:300;margin-bottom:.3rem;}
.rel-price{font-size:.8rem;color:var(--muted);}

/* FOOTER */
footer{background:var(--ink);padding:1.8rem 40px;}
.foot-simple{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:.7rem;color:rgba(255,255,255,.25);flex-wrap:wrap;gap:.5rem;}
.foot-simple a{color:var(--pink-md);}

@media(max-width:960px){
  .prod-grid{grid-template-columns:1fr;}
  .img-main{height:340px;}
  .hdr,.breadcrumb,.prod-wrap,.rel-inner{padding-left:24px;padding-right:24px;}
}
@media(max-width:600px){nav{display:none;}}
</style>
</head>
<body>

<header>
<div class="hdr">
  <a class="logo" href="index.html">
    <div class="logo-wrap">
      <svg width="32" height="32" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <style>.em-s{font-family:'Cormorant Garamond',serif;font-size:140px;font-style:italic;font-weight:300;fill:#8a4f58;}.rt-s{font-family:'Jost',sans-serif;font-size:22px;font-weight:300;fill:#7a6a6e;letter-spacing:3px;}.rb-s{font-family:'Jost',sans-serif;font-size:19px;font-weight:300;fill:#9a8880;letter-spacing:2px;}</style>
        <path id="aTs" d="M 30,150 A 120,120 0 0,1 270,150" fill="none"/>
        <text class="rt-s"><textPath href="#aTs" startOffset="50%" text-anchor="middle">ESTILO ARTESANAL</textPath></text>
        <path id="aBs" d="M 48,165 A 105,105 0 0,0 252,165" fill="none"/>
        <text class="rb-s"><textPath href="#aBs" startOffset="50%" text-anchor="middle">TODO HECHO A MANO</textPath></text>
        <text x="150" y="188" text-anchor="middle" class="em-s">E</text>
      </svg>
    </div>
    <div class="logo-text">
      <span>Estilo Artesanal.emma</span>
      <small>hecho a mano · Colonia Caroya</small>
    </div>
  </a>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="index.html#productos">Productos</a>
    <a href="index.html#retiro">Retiro</a>
  </nav>
  <button class="btn-back" onclick="location.href='index.html#productos'">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Volver
  </button>
</div>
</header>

<nav class="breadcrumb">
  <a href="index.html">Inicio</a>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  <a href="index.html#productos">Productos</a>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  <span id="bc-name">Cargando...</span>
</nav>

<div class="prod-wrap">
<div class="prod-grid">
  <div>
    <img class="img-main" id="main-img" src="" alt="Producto"/>
    <div class="img-thumbs" id="thumbs"></div>
  </div>
  <div id="prod-info"></div>
</div>
</div>

<section class="related">
<div class="rel-inner">
  <p class="rel-eyebrow">Seguí viendo</p>
  <h3 class="rel-title">También te puede <em>gustar</em></h3>
  <div class="rel-grid" id="rel-grid"></div>
</div>
</section>

<footer>
<div class="foot-simple">
  <span>© 2026 · estiloartesanal.emma · Calle 43 N° 4364 · Colonia Caroya</span>
  <a href="index.html">Volver al inicio</a>
</div>
</footer>

<script>
const BACKEND = "https://estiloartesanal-emma.onrender.com";
const FALLBACK_IMG = "https://images.unsplash.com/photo-1599305445671-ac291c95aaa9?q=85&w=900&auto=format&fit=crop";
const CHECK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;flex-shrink:0;"><path d="M20 6L9 17l-5-5"/></svg>`;

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

async function loadProduct(){
  const id = getParam("id");
  if(!id){window.location.href="index.html";return;}

  let catalog = {};
  try {
    const r = await fetch(BACKEND+"/productos.json");
    if(r.ok) catalog = await r.json();
  } catch(e) {}

  let p = catalog[id];

  // Si no está en el catálogo, mostrar error
  if(!p){
    document.getElementById("bc-name").textContent = "Producto no encontrado";
    document.getElementById("prod-info").innerHTML = \`<p style="color:var(--muted);font-size:.88rem;">Este producto no está disponible.</p>
      <a href="index.html#productos" style="font-size:.75rem;color:var(--pink-dk);">← Ver todos los productos</a>\`;
    return;
  }

  document.title = p.nombre + " · estiloartesanal.emma";
  document.getElementById("bc-name").textContent = p.nombre;

  // Imagen principal
  const mi = document.getElementById("main-img");
  const imgSrc = p.imagen || FALLBACK_IMG;
  mi.src = imgSrc;
  mi.onerror = () => { mi.src = FALLBACK_IMG; };
  mi.alt = p.nombre;

  // Thumbnails
  document.getElementById("thumbs").innerHTML =
    \`<img class="thumb active" src="\${imgSrc}" onerror="this.src='\${FALLBACK_IMG}'" onclick="setMain(this,'\${imgSrc}')"/>\`;

  // Precio
  const precio = p.precio > 0 ? "$" + p.precio.toLocaleString("es-AR") : "Consultar";
  const precioLabel = p.peso ? p.peso : (p.stock > 0 ? p.stock + " unidad" + (p.stock !== 1 ? "es disponibles" : "") : "Agotado");

  // Ingredientes y características
  const ingr = (p.ingredientes||[]).length
    ? (p.ingredientes||[]).map(i=>\`<span class="ingr-chip">\${i}</span>\`).join("")
    : \`<span class="ingr-chip" style="color:var(--muted);">No especificados</span>\`;

  const props = (p.caracteristicas||[]).length
    ? (p.caracteristicas||[]).map(pr=>\`<div class="prop-row">\${CHECK}\${pr}</div>\`).join("")
    : \`<div class="prop-row">\${CHECK}Hecho a mano</div><div class="prop-row">\${CHECK}Sin sulfatos ni parabenos</div>\`;

  const catLabel = {jabones:"Jabones",sahumadores:"Sahumadores",ceramica:"Cerámica",deco:"Decoración"}[p.categoria]||p.categoria;

  const agotado = p.stock <= 0;
  const inactivo = p.activo === false;

  document.getElementById("prod-info").innerHTML = \`
    <p class="eyebrow">\${catLabel}</p>
    <h1 style="font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);font-weight:300;line-height:1.08;margin-bottom:.7rem;">\${p.nombre}</h1>
    <p style="font-family:var(--serif);font-size:2rem;font-weight:400;color:var(--clay);margin-bottom:1.4rem;">\${precio} <small style="font-family:var(--sans);font-size:.72rem;color:var(--muted);">\${precioLabel}</small></p>
    \${p.descripcion ? \`<p style="font-size:.9rem;color:var(--muted);line-height:1.9;margin-bottom:1.8rem;">\${p.descripcion}</p>\` : ""}
    <p class="block-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:11px;height:11px;"><path d="M17 8C8 10 5.9 16.17 3.82 19.34c-.9 1.4 1.34 2.34 2.46.97L12 13l7 7"/></svg>Ingredientes</p>
    <div class="chips">\${ingr}</div>
    <p class="block-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:11px;height:11px;"><path d="M20 6L9 17l-5-5"/></svg>Características</p>
    <div class="props-list">\${props}</div>
    <div class="actions">
      \${agotado||inactivo
        ? \`<button class="btn btn-buy" disabled style="opacity:.5;cursor:not-allowed;">Sin stock</button>
           <a class="btn btn-mp" href="https://instagram.com/estiloartesanal_emma" target="_blank" style="background:var(--bg);color:var(--ink);box-shadow:4px 4px 10px rgba(0,0,0,.1);">Consultar por Instagram</a>\`
        : \`<button class="btn btn-buy" onclick="irCheckout('\${id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Comprar ahora
           </button>
           <button class="btn btn-mp" onclick="irCheckout('\${id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:14px;height:14px;"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>Pagar con Mercado Pago
           </button>\`
      }
    </div>
    <p class="pickup-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Retiro personal · Calle 43 N° 4364 · Colonia Caroya · Solo con cita previa
    </p>
  \`;

  // Relacionados
  const relIds = Object.keys(catalog).filter(k => k !== id && catalog[k].categoria === p.categoria && catalog[k].activo !== false).slice(0,3);
  document.getElementById("rel-grid").innerHTML = relIds.map(rid => {
    const r = catalog[rid];
    const rImg = r.imagen || FALLBACK_IMG;
    const rPrecio = r.precio > 0 ? "$" + r.precio.toLocaleString("es-AR") : "Consultar";
    const rCat = {jabones:"Jabones",sahumadores:"Sahumadores",ceramica:"Cerámica",deco:"Decoración"}[r.categoria]||r.categoria;
    return \`<a class="rel-card" href="producto.html?id=\${rid}">
      <img class="rel-img" src="\${rImg}" onerror="this.src='\${FALLBACK_IMG}'" alt="\${r.nombre}"/>
      <div class="rel-body"><p class="rel-cat">\${rCat}</p><p class="rel-name">\${r.nombre}</p><p class="rel-price">\${rPrecio}</p></div>
    </a>\`;
  }).join("");
}

function setMain(thumb, src){
  document.querySelectorAll(".thumb").forEach(t=>t.classList.remove("active"));
  thumb.classList.add("active");
  const mi = document.getElementById("main-img");
  mi.src = src; mi.onerror = () => { mi.src = FALLBACK_IMG; };
}

function irCheckout(id){ window.location.href = "checkout.html?id=" + id; }

loadProduct();
</script>
</body>
</html>
