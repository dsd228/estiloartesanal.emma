<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Producto · estiloartesanal.emma</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--white:#fff;--off:#f8f6f2;--sage:#8fa882;--sage-lt:#edf2e9;--sage-dk:#5a7050;--terra:#b07355;--clay:#d4a882;--sand:#ede5d8;--dark:#1c1a17;--muted:#7a756e;--border:#e8e2d8;--r:12px;--font-d:'Cormorant Garamond',serif;--font-b:'Jost',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-b);background:var(--white);color:var(--dark);line-height:1.6;}
img{display:block;max-width:100%;}

header{position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);}
.hdr{max-width:1160px;margin:0 auto;padding:.85rem 28px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;}
.logo-text .ln{font-family:var(--font-d);font-size:1.1rem;color:var(--dark);}
.logo-text .ls{font-size:.58rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;display:block;}
nav a{font-size:.76rem;font-weight:400;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);margin-left:2rem;text-decoration:none;transition:color .2s;}
nav a:hover{color:var(--sage-dk);}

.btn{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--font-b);font-size:.76rem;font-weight:400;letter-spacing:.8px;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn:hover{transform:translateY(-2px);}
.btn-dark{background:var(--dark);color:var(--white);padding:.85rem 2rem;}
.btn-dark:hover{background:var(--sage-dk);}
.btn-mp{background:#009ee3;color:var(--white);padding:.85rem 2rem;}
.btn-mp:hover{background:#007fc5;}
.btn-outline{background:transparent;color:var(--dark);padding:.83rem 1.8rem;border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--sage);color:var(--sage-dk);}
.btn svg{width:14px;height:14px;}
.btn-full{width:100%;justify-content:center;}

/* BREADCRUMB */
.breadcrumb{max-width:1160px;margin:0 auto;padding:1.4rem 28px .4rem;display:flex;align-items:center;gap:.5rem;font-size:.75rem;color:var(--muted);}
.breadcrumb a{color:var(--muted);text-decoration:none;transition:color .2s;}
.breadcrumb a:hover{color:var(--sage-dk);}
.breadcrumb svg{width:10px;height:10px;}

/* MAIN GRID */
.prod-wrap{max-width:1160px;margin:0 auto;padding:20px 28px 80px;}
.prod-grid{display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:start;}

/* LEFT — IMAGES */
.img-main{width:100%;height:520px;object-fit:cover;border-radius:60px 20px 60px 20px;box-shadow:0 28px 60px rgba(0,0,0,.11);}
.img-thumbs{display:flex;gap:.7rem;margin-top:.9rem;}
.thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;cursor:pointer;border:2px solid transparent;transition:border-color .2s;opacity:.7;transition:all .2s;}
.thumb.active,.thumb:hover{border-color:var(--sage);opacity:1;}

/* RIGHT — INFO */
.eyebrow{font-size:.66rem;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--sage);margin-bottom:.5rem;display:flex;align-items:center;gap:.55rem;}
.eyebrow::before{content:'';width:22px;height:1px;background:var(--sage);}
.prod-title{font-family:var(--font-d);font-size:clamp(2.2rem,4vw,3.2rem);font-weight:300;line-height:1.08;margin-bottom:.7rem;}
.prod-price{font-family:var(--font-d);font-size:2rem;font-weight:400;color:var(--terra);margin-bottom:1.4rem;}
.prod-price small{font-family:var(--font-b);font-size:.74rem;color:var(--muted);}
.prod-desc{font-size:.93rem;color:var(--muted);line-height:1.85;margin-bottom:1.8rem;}

/* INGREDIENTS */
.block-title{font-size:.66rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;display:flex;align-items:center;gap:.4rem;}
.block-title svg{width:11px;height:11px;}
.chips{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:1.8rem;}
.ingr-chip{font-size:.75rem;background:var(--sage-lt);color:var(--sage-dk);padding:.24rem .75rem;border-radius:20px;border:1px solid rgba(90,112,80,.15);}

/* PROPERTIES */
.props-list{margin-bottom:2rem;display:flex;flex-direction:column;gap:.15rem;}
.prop-row{display:flex;align-items:center;gap:.7rem;padding:.5rem 0;border-bottom:1px solid var(--off);font-size:.88rem;color:var(--dark);}
.prop-row svg{width:15px;height:15px;color:var(--sage);flex-shrink:0;}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1rem;}
.pickup-note{display:flex;align-items:center;gap:.4rem;font-size:.76rem;color:var(--muted);margin-top:.3rem;}
.pickup-note svg{width:11px;height:11px;color:var(--clay);flex-shrink:0;}

/* RELATED */
.related{background:var(--off);padding:70px 0;margin-top:60px;}
.rel-inner{max-width:1160px;margin:0 auto;padding:0 28px;}
.rel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;margin-top:2rem;}
.rel-card{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .3s;text-decoration:none;display:block;}
.rel-card:hover{transform:translateY(-7px);box-shadow:0 22px 44px rgba(0,0,0,.08);}
.rel-img{width:100%;height:200px;object-fit:cover;}
.rel-body{padding:1rem 1.2rem 1.3rem;}
.rel-cat{font-size:.62rem;letter-spacing:.8px;text-transform:uppercase;color:var(--sage);margin-bottom:.2rem;}
.rel-name{font-family:var(--font-d);font-size:1.3rem;font-weight:400;margin-bottom:.3rem;}
.rel-price{font-size:.82rem;color:var(--muted);}

/* FOOTER */
footer{background:var(--dark);color:#c2bab2;padding:3rem 28px 1.8rem;}
.foot-bottom-simple{max-width:1160px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;font-size:.74rem;color:#6a6058;flex-wrap:wrap;gap:.5rem;}
.foot-bottom-simple a{color:var(--clay);text-decoration:none;}

@media(max-width:960px){
  .prod-grid{grid-template-columns:1fr;}
  .img-main{height:340px;}
}
@media(max-width:640px){
  nav{display:none;}
}
</style>
</head>
<body>

<header>
<div class="hdr">
  <a class="logo" href="index.html">
    <svg width="34" height="34" viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="none" stroke="#d4a882" stroke-width="1.2"/><circle cx="18" cy="18" r="13.5" fill="none" stroke="#e8e2d8" stroke-width=".6" stroke-dasharray="2.5 3.5"/><text x="18" y="23.5" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="18" fill="#b07355" font-style="italic">E</text></svg>
    <div class="logo-text"><span class="ln">estiloartesanal.emma</span><span class="ls">hecho a mano · la plata</span></div>
  </a>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="index.html#productos">Productos</a>
    <a href="index.html#retiro">Retiro</a>
  </nav>
  <a class="btn btn-dark" href="index.html#productos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    Volver
  </a>
</div>
</header>

<nav class="breadcrumb">
  <a href="index.html">Inicio</a>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  <a href="index.html#productos">Productos</a>
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
  <span id="bc-name">Cargando...</span>
</nav>

<div class="prod-wrap">
<div class="prod-grid">
  <div>
    <img class="img-main" id="main-img" src="" alt="Producto"/>
    <div class="img-thumbs" id="thumbs"></div>
  </div>
  <div id="prod-info"></div>
</div>
</div>

<section class="related">
<div class="rel-inner">
  <p style="font-size:.66rem;font-weight:400;letter-spacing:3px;text-transform:uppercase;color:var(--sage);margin-bottom:.4rem;display:flex;align-items:center;gap:.5rem;"><span style="width:22px;height:1px;background:var(--sage);display:inline-block;"></span>Seguí viendo</p>
  <h3 style="font-family:var(--font-d);font-size:2.2rem;font-weight:300;margin-bottom:.2rem;">También te puede <em style="font-style:italic;color:var(--terra)">gustar</em></h3>
  <div class="rel-grid" id="rel-grid"></div>
</div>
</section>

<footer>
<div class="foot-bottom-simple">
  <span>© 2026 · estiloartesanal.emma · Calle 43 N° 4364 · La Plata</span>
  <a href="index.html">Volver al inicio</a>
</div>
</footer>

<script>
const BACKEND = "https://estiloartesanal-emma.onrender.com";

const CATALOG = {
  'jabon-lavanda':{cat:'Jabones',name:'Jabón de Lavanda',price:'$4.800',priceNum:4800,priceLabel:'por unidad',desc:'Jabón artesanal de glicerina vegetal con aceite esencial de lavanda y aceite de oliva. Espuma cremosa y aroma relajante, ideal para el baño nocturno o para regalar. Curado 4 semanas para la mejor calidad.',ingredients:['Glicerina vegetal pura','Aceite esencial de lavanda','Aceite de oliva extra virgen','Agua destilada','Soda cáustica (NaOH)'],props:['Hidratante y nutritivo','Espuma cremosa y suave','Aroma calmante y relajante','Sin sulfatos ni parabenos','Curado mínimo 4 semanas','Apto para piel sensible'],img:'assets/images/jabon-lavanda.jpg',fallback:'https://images.unsplash.com/photo-1607006332611-ff950d0bf067?q=85&w=900&auto=format&fit=crop'},
  'jabon-citrico':{cat:'Jabones',name:'Jabón Cítrico',price:'$4.800',priceNum:4800,priceLabel:'por unidad',desc:'Glicerina vegetal con aceite de limón y naranja dulce, más manteca de karité para hidratación extra. Revitalizante y energizante, perfecto para arrancar el día.',ingredients:['Glicerina vegetal pura','Aceite esencial de limón','Aceite de naranja dulce','Manteca de karité','Arcilla amarilla'],props:['Revitalizante y energizante','Rico en vitamina C natural','Espuma cremosa y suave','Ilumina y suaviza la piel','Sin sulfatos ni parabenos'],img:'assets/images/jabon-citrico.jpg',fallback:'https://images.unsplash.com/photo-1556228578-dd539282b964?q=85&w=900&auto=format&fit=crop'},
  'jabon-romero':{cat:'Jabones',name:'Jabón de Romero',price:'$4.800',priceNum:4800,priceLabel:'por unidad',desc:'Glicerina vegetal y aceite esencial de romero combinado con arcilla verde purificante. Limpieza profunda sin agredir la piel — ideal para piel mixta o grasa.',ingredients:['Glicerina vegetal pura','Aceite esencial de romero','Arcilla verde purificante','Aceite de coco','Agua destilada'],props:['Purificante y refrescante','Arcilla verde detox','Control de oleosidad','Espuma abundante','Apto para piel mixta o grasa'],img:'assets/images/velas.jpg',fallback:'https://images.unsplash.com/photo-1612817288484-6f916006741a?q=85&w=900&auto=format&fit=crop'},
  'ceramica':{cat:'Cerámica',name:'Piezas de cerámica esmaltadas',price:'$12.500',priceNum:12500,priceLabel:'aprox. por pieza',desc:'Tazas, cuencos, macetas y objetos únicos esmaltados a mano. Cada pieza es irrepetible — su textura y color son únicos. Aptas para microondas y lavavajillas.',ingredients:['Arcilla alta temperatura','Esmaltes naturales','Óxidos minerales','Cocción en horno cerámico'],props:['Pieza única e irrepetible','Apta microondas y lavavajillas','Esmaltada a mano','Alta durabilidad','Empaque para regalo gratis'],img:'assets/images/ceramica.jpg',fallback:'https://images.unsplash.com/photo-1565193566173-7a0ee3dbe261?q=85&w=900&auto=format&fit=crop'},
  'deco':{cat:'Decoración',name:'Objetos decorativos de hogar',price:'$3.200',priceNum:3200,priceLabel:'desde',desc:'Pequeñas esculturas, sahumerios y piezas únicas para el hogar. Arcilla y terracota con acabados naturales. Perfectas como regalo original.',ingredients:['Arcilla natural','Terracota','Acabados a mano'],props:['Pieza única sin molde','Arcilla y terracota natural','Ideal como regalo','Arte cotidiano','100% hecho a mano'],img:'assets/images/deco.jpg',fallback:'https://images.unsplash.com/photo-1588515724527-074a7a56616c?q=85&w=900&auto=format&fit=crop'},
};

const CHECK_SVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="width:15px;height:15px;flex-shrink:0;color:var(--sage)"><path d="M20 6L9 17l-5-5"/></svg>`;

function getParam(k){return new URLSearchParams(window.location.search).get(k);}

function loadProduct(){
  const id = getParam('id') || 'jabon-lavanda';
  const p  = CATALOG[id];
  if(!p){ window.location.href='index.html'; return; }

  document.title = p.name + ' · estiloartesanal.emma';
  document.getElementById('bc-name').textContent = p.name;

  // main image
  const mi = document.getElementById('main-img');
  mi.src = p.img;
  mi.onerror = ()=>{ mi.src = p.fallback; };
  mi.alt = p.name;

  // thumbs (just one for now, can expand)
  document.getElementById('thumbs').innerHTML = `
    <img class="thumb active" src="${p.img}" onerror="this.src='${p.fallback}'" onclick="setMain(this,'${p.img}','${p.fallback}')"/>
  `;

  // info
  const chips = p.ingredients.map(i=>`<span class="ingr-chip">${i}</span>`).join('');
  const props = p.props.map(pr=>`<div class="prop-row">${CHECK_SVG}${pr}</div>`).join('');

  document.getElementById('prod-info').innerHTML = `
    <p class="eyebrow">${p.cat}</p>
    <h1 class="prod-title">${p.name}</h1>
    <p class="prod-price">${p.price} <small>${p.priceLabel}</small></p>
    <p class="prod-desc">${p.desc}</p>

    <p class="block-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 8C8 10 5.9 16.17 3.82 19.34c-.9 1.4 1.34 2.34 2.46.97L12 13l7 7"/></svg>
      Ingredientes
    </p>
    <div class="chips">${chips}</div>

    <p class="block-title">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 6L9 17l-5-5"/></svg>
      Características
    </p>
    <div class="props-list">${props}</div>

    <div class="actions">
      <button class="btn btn-dark btn-full" onclick="irCheckout('${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        Comprar ahora
      </button>
      <button class="btn btn-mp btn-full" onclick="irCheckout('${id}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>
        Pagar con Mercado Pago
      </button>
    </div>
    <p class="pickup-note">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
      Retiro personal · Calle 43 N° 4364 · La Plata · Solo con cita previa
    </p>
  `;

  // related
  const relIds = Object.keys(CATALOG).filter(k=>k!==id).slice(0,3);
  document.getElementById('rel-grid').innerHTML = relIds.map(rid=>{
    const r = CATALOG[rid];
    return `<a class="rel-card" href="producto.html?id=${rid}">
      <img class="rel-img" src="${r.img}" onerror="this.src='${r.fallback}'" alt="${r.name}"/>
      <div class="rel-body">
        <p class="rel-cat">${r.cat}</p>
        <p class="rel-name">${r.name}</p>
        <p class="rel-price">${r.price}</p>
      </div>
    </a>`;
  }).join('');
}

function setMain(thumb, src, fallback){
  document.querySelectorAll('.thumb').forEach(t=>t.classList.remove('active'));
  thumb.classList.add('active');
  const mi = document.getElementById('main-img');
  mi.src = src; mi.onerror=()=>{mi.src=fallback;};
}

function irCheckout(id){
  window.location.href = 'checkout.html?id='+id;
}

loadProduct();
</script>
</body>
</html>
