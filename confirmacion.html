<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>"/>
<title>Confirmación · estiloartesanal.emma</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#e8e0d8;--bg-lt:#f5efe8;
  --sd:#c4bcb4;--sl:#ffffff;
  --pink:#E8C1C7;--pink-dk:#8a4f58;--pink-md:#c89aa8;
  --ink:#3a2a2e;--muted:#9a8880;--clay:#c8956a;
  --serif:'Cormorant Garamond',serif;--sans:'Jost',sans-serif;
  --nm:8px 8px 20px var(--sd),-8px -8px 20px var(--sl);
  --nm-in:inset 5px 5px 14px var(--sd),inset -5px -5px 14px var(--sl);
  --nm-sm:4px 4px 10px var(--sd),-4px -4px 10px var(--sl);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}
img{display:block;max-width:100%;}
a{text-decoration:none;color:inherit;}

/* HEADER */
header{background:rgba(232,224,216,.97);backdrop-filter:blur(14px);box-shadow:0 4px 14px var(--sd);}
.hdr{max-width:680px;margin:0 auto;padding:0 28px;height:66px;display:flex;align-items:center;justify-content:center;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-wrap{width:44px;height:44px;border-radius:50%;background:var(--bg);box-shadow:var(--nm-sm);display:flex;align-items:center;justify-content:center;}
.logo-wrap svg{width:30px;height:30px;}
.logo-text span{font-family:var(--serif);font-size:.9rem;font-style:italic;color:var(--ink);display:block;}
.logo-text small{font-size:.48rem;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

/* STATUS CARD */
.status-card{
  background:var(--bg);border-radius:24px;
  box-shadow:var(--nm);
  max-width:540px;width:100%;overflow:hidden;
}

.status-top{padding:3rem 2.5rem 2rem;text-align:center;}

.status-icon{
  width:88px;height:88px;border-radius:50%;
  background:var(--bg);box-shadow:var(--nm-in);
  margin:0 auto 1.6rem;
  display:flex;align-items:center;justify-content:center;
}
.status-icon svg{width:38px;height:38px;}
.status-icon.success svg{color:var(--pink-dk);}
.status-icon.pending svg{color:#c47d0e;}
.status-icon.error svg{color:#b03030;}

.status-top h1{font-family:var(--serif);font-size:2.4rem;font-weight:300;margin-bottom:.6rem;line-height:1.1;}
.status-top h1 em{font-style:italic;color:var(--clay);}
.status-top p{font-size:.88rem;color:var(--muted);line-height:1.75;max-width:400px;margin:0 auto;}

/* ORDER SUMMARY */
.status-order{
  background:var(--bg-lt);padding:1.5rem 2.5rem;
  box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl);
}
.order-title{font-size:.63rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}
.order-title svg{width:11px;height:11px;}
.order-row{display:flex;justify-content:space-between;font-size:.84rem;margin-bottom:.35rem;}
.order-row strong{font-weight:500;}

/* PICKUP */
.status-pickup{padding:1.4rem 2.5rem;}
.pickup-header{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem;}
.pickup-ico{width:40px;height:40px;border-radius:11px;background:var(--bg);box-shadow:var(--nm-sm);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pickup-ico svg{width:17px;height:17px;color:var(--pink-dk);}
.pickup-header strong{font-size:.88rem;}
.pickup-header span{font-size:.74rem;color:var(--muted);display:block;}
.pickup-info{
  background:var(--bg);border-radius:12px;
  box-shadow:var(--nm-in);
  padding:.9rem 1.1rem;font-size:.82rem;color:var(--muted);line-height:1.65;
}

/* ACTIONS */
.status-actions{padding:1.4rem 2.5rem 2.2rem;display:flex;flex-direction:column;gap:.8rem;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;font-family:var(--sans);font-size:.72rem;font-weight:400;letter-spacing:1.2px;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:all .22s;padding:.85rem 2rem;width:100%;}
.btn:hover{transform:translateY(-2px);}
.btn-sage{background:var(--pink-dk);color:#fff;box-shadow:4px 4px 10px rgba(138,79,88,.3),-2px -2px 8px rgba(255,255,255,.2);}
.btn-sage:hover{background:#7a3f48;}
.btn-outline{background:var(--bg);color:var(--ink);box-shadow:var(--nm-sm);}
.btn-outline:hover{box-shadow:var(--nm-in);color:var(--pink-dk);}
.btn-ig{background:var(--bg);color:var(--pink-dk);box-shadow:var(--nm-sm);}
.btn-ig:hover{box-shadow:var(--nm-in);}
.btn svg{width:13px;height:13px;}

/* CONFETTI */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0;animation:fall linear forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}

footer{background:var(--ink);padding:.9rem 28px;text-align:center;}
footer p{font-size:.7rem;color:rgba(255,255,255,.25);}
footer a{color:var(--pink-md);}
</style>
</head>
<body>

<div class="confetti-wrap" id="confetti"></div>

<header>
<div class="hdr">
  <a class="logo" href="index.html">
    <div class="logo-wrap">
      <svg width="30" height="30" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
        <style>.em-cf{font-family:'Cormorant Garamond',serif;font-size:140px;font-style:italic;font-weight:300;fill:#8a4f58;}.rt-cf{font-family:'Jost',sans-serif;font-size:22px;font-weight:300;fill:#7a6a6e;letter-spacing:3px;}.rb-cf{font-family:'Jost',sans-serif;font-size:19px;font-weight:300;fill:#9a8880;letter-spacing:2px;}</style>
        <path id="aTcf" d="M 30,150 A 120,120 0 0,1 270,150" fill="none"/>
        <text class="rt-cf"><textPath href="#aTcf" startOffset="50%" text-anchor="middle">ESTILO ARTESANAL</textPath></text>
        <path id="aBcf" d="M 48,165 A 105,105 0 0,0 252,165" fill="none"/>
        <text class="rb-cf"><textPath href="#aBcf" startOffset="50%" text-anchor="middle">TODO HECHO A MANO</textPath></text>
        <text x="150" y="188" text-anchor="middle" class="em-cf">E</text>
      </svg>
    </div>
    <div class="logo-text">
      <span>Estilo Artesanal.emma</span>
      <small>confirmación</small>
    </div>
  </a>
</div>
</header>

<main>
<div class="status-card" id="status-card"></div>
</main>

<footer>
<p>© 2026 · <a href="index.html">estiloartesanal.emma</a> · Calle 43 N° 4364 · Colonia Caroya</p>
</footer>

<script>
function getParam(k){return new URLSearchParams(window.location.search).get(k);}
const via=getParam('via');
const mpStatus=getParam('collection_status')||getParam('status');
const pedido=JSON.parse(sessionStorage.getItem('pedido')||'{}');

function orderBlock(){
  if(!pedido.nombre&&!pedido.producto)return'';
  return`<div class="status-order">
    <p class="order-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px;"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>Detalle del pedido</p>
    ${pedido.nombre?`<div class="order-row"><span>Comprador/a</span><strong>${pedido.nombre}</strong></div>`:''}
    ${pedido.producto?`<div class="order-row"><span>Producto</span><strong>${pedido.producto}</strong></div>`:''}
    ${pedido.precio?`<div class="order-row"><span>Total</span><strong>${pedido.precio}</strong></div>`:''}
  </div>`;
}

function renderSuccess(){
  spawnConfetti();
  document.getElementById('status-card').innerHTML=`
    <div class="status-top">
      <div class="status-icon success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 15.01 9 12.01"/></svg></div>
      <h1>¡Pedido <em>confirmado!</em></h1>
      <p>Tu pedido fue recibido. En breve Emma se va a contactar para coordinar el retiro.</p>
    </div>
    ${orderBlock()}
    <div class="status-pickup">
      <div class="pickup-header">
        <div class="pickup-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div><strong>Punto de retiro</strong><span>Con cita previa — te escribimos pronto</span></div>
      </div>
      <div class="pickup-info">📍 Calle 43 N° 4364 · Colonia Caroya · Córdoba<br/>📱 Te contactamos por Instagram para coordinar</div>
    </div>
    <div class="status-actions">
      <a class="btn btn-sage" href="https://instagram.com/estiloartesanal_emma" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        Seguir en Instagram
      </a>
      <a class="btn btn-outline" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Volver al inicio
      </a>
    </div>`;
}

function renderIG(){
  spawnConfetti();
  document.getElementById('status-card').innerHTML=`
    <div class="status-top">
      <div class="status-icon success"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg></div>
      <h1>¡Solicitud <em>enviada!</em></h1>
      <p>Emma recibió tu pedido. Escribile por Instagram para coordinar el retiro y el pago.</p>
    </div>
    ${orderBlock()}
    <div class="status-pickup">
      <div class="pickup-header">
        <div class="pickup-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div><strong>Retiro en el taller</strong><span>Calle 43 N° 4364 · Colonia Caroya</span></div>
      </div>
      <div class="pickup-info">Coordinar día y hora por Instagram · Formas de pago: transferencia, efectivo o Mercado Pago</div>
    </div>
    <div class="status-actions">
      <a class="btn btn-ig" href="https://instagram.com/estiloartesanal_emma" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        Escribir a @estiloartesanal_emma
      </a>
      <a class="btn btn-outline" href="index.html">Volver al inicio</a>
    </div>`;
}

function renderPending(){
  document.getElementById('status-card').innerHTML=`
    <div class="status-top">
      <div class="status-icon pending"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
      <h1>Pago <em>pendiente</em></h1>
      <p>Tu pago está siendo procesado. Te avisamos cuando se confirme, normalmente en pocas horas.</p>
    </div>
    ${orderBlock()}
    <div class="status-actions">
      <a class="btn btn-sage" href="https://instagram.com/estiloartesanal_emma" target="_blank">Consultar por Instagram</a>
      <a class="btn btn-outline" href="index.html">Volver al inicio</a>
    </div>`;
}

function renderError(){
  document.getElementById('status-card').innerHTML=`
    <div class="status-top">
      <div class="status-icon error"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg></div>
      <h1>Pago <em>no procesado</em></h1>
      <p>Hubo un problema con el pago. Podés intentar de nuevo o coordinar por Instagram directamente.</p>
    </div>
    <div class="status-actions" style="padding:1.5rem 2.5rem 2rem;">
      <a class="btn btn-sage" href="javascript:history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Intentar de nuevo
      </a>
      <a class="btn btn-ig" href="https://instagram.com/estiloartesanal_emma" target="_blank">Coordinar por Instagram</a>
      <a class="btn btn-outline" href="index.html">Volver al inicio</a>
    </div>`;
}

function spawnConfetti(){
  const colors=['#E8C1C7','#c89aa8','#c8956a','#8a4f58','#f5dde0'];
  const wrap=document.getElementById('confetti');
  for(let i=0;i<55;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'4px'};animation-duration:${2+Math.random()*2.5}s;animation-delay:${Math.random()*.8}s;`;
    wrap.appendChild(c);
  }
  setTimeout(()=>wrap.remove(),5000);
}

if(via==='ig') renderIG();
else if(mpStatus==='approved') renderSuccess();
else if(mpStatus==='pending'||mpStatus==='in_process') renderPending();
else if(mpStatus==='rejected'||mpStatus==='cancelled') renderError();
else renderSuccess();

sessionStorage.removeItem('pedido');
</script>
</body>
</html>
