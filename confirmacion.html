<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Confirmación · estiloartesanal.emma</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{--white:#fff;--off:#f8f6f2;--sage:#8fa882;--sage-lt:#edf2e9;--sage-dk:#5a7050;--terra:#b07355;--clay:#d4a882;--sand:#ede5d8;--dark:#1c1a17;--muted:#7a756e;--border:#e8e2d8;--r:12px;--font-d:'Cormorant Garamond',serif;--font-b:'Jost',sans-serif;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-b);background:var(--off);color:var(--dark);line-height:1.6;min-height:100vh;display:flex;flex-direction:column;}
img{display:block;max-width:100%;}

header{background:var(--white);border-bottom:1px solid var(--border);}
.hdr{max-width:680px;margin:0 auto;padding:.85rem 28px;display:flex;align-items:center;justify-content:center;}
.logo{display:flex;align-items:center;gap:.5rem;text-decoration:none;}
.logo-text .ln{font-family:var(--font-d);font-size:1.05rem;color:var(--dark);}
.logo-text .ls{font-size:.56rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:block;}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

/* STATUS CARD */
.status-card{background:var(--white);border-radius:24px;border:1px solid var(--border);max-width:560px;width:100%;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.07);}
.status-top{padding:3rem 2.5rem 2rem;text-align:center;}
.status-icon{width:80px;height:80px;border-radius:50%;margin:0 auto 1.5rem;display:flex;align-items:center;justify-content:center;}
.status-icon.success{background:var(--sage-lt);}
.status-icon.pending{background:#fff8ec;}
.status-icon.error{background:#fef0f0;}
.status-icon svg{width:38px;height:38px;}
.status-icon.success svg{color:var(--sage-dk);}
.status-icon.pending svg{color:#c47d0e;}
.status-icon.error svg{color:#b03030;}
.status-top h1{font-family:var(--font-d);font-size:2.4rem;font-weight:300;margin-bottom:.6rem;line-height:1.1;}
.status-top h1 em{font-style:italic;color:var(--terra);}
.status-top p{font-size:.9rem;color:var(--muted);line-height:1.75;max-width:400px;margin:0 auto;}

/* ORDER SUMMARY */
.status-order{background:var(--off);padding:1.5rem 2.5rem;border-top:1px solid var(--border);}
.order-title{font-size:.65rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:.9rem;display:flex;align-items:center;gap:.4rem;}
.order-title svg{width:10px;height:10px;}
.order-row{display:flex;justify-content:space-between;font-size:.86rem;margin-bottom:.35rem;}
.order-row strong{font-weight:500;}

/* PICKUP */
.status-pickup{padding:1.4rem 2.5rem;border-top:1px solid var(--border);}
.pickup-header{display:flex;align-items:center;gap:.6rem;margin-bottom:.7rem;}
.pickup-ico{width:36px;height:36px;border-radius:9px;background:var(--terra);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pickup-ico svg{width:16px;height:16px;color:var(--white);}
.pickup-header strong{font-size:.9rem;}
.pickup-header span{font-size:.76rem;color:var(--muted);display:block;}
.pickup-info{background:var(--off);border-radius:var(--r);padding:.9rem 1.1rem;font-size:.84rem;color:var(--muted);line-height:1.65;}

/* ACTIONS */
.status-actions{padding:1.5rem 2.5rem 2rem;display:flex;flex-direction:column;gap:.8rem;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.45rem;font-family:var(--font-b);font-size:.76rem;font-weight:400;letter-spacing:.7px;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;transition:all .2s;text-decoration:none;padding:.85rem 2rem;width:100%;}
.btn:hover{transform:translateY(-2px);}
.btn-sage{background:var(--sage);color:var(--white);}
.btn-sage:hover{background:var(--sage-dk);}
.btn-outline{background:transparent;color:var(--dark);border:1.5px solid var(--border);}
.btn-outline:hover{border-color:var(--sage);color:var(--sage-dk);}
.btn-ig{background:#f7f0f7;color:#7b3fa0;border:1.5px solid #e4c8f0;}
.btn-ig:hover{background:#ede0f5;}
.btn svg{width:13px;height:13px;}

/* CONFETTI animation for success */
.confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.confetti-piece{position:absolute;width:8px;height:8px;border-radius:2px;opacity:0;animation:fall linear forwards;}
@keyframes fall{0%{opacity:1;transform:translateY(-20px) rotate(0deg);}100%{opacity:0;transform:translateY(100vh) rotate(720deg);}}

footer{background:var(--white);border-top:1px solid var(--border);padding:.9rem 28px;text-align:center;}
footer p{font-size:.72rem;color:var(--muted);}
footer a{color:var(--terra);text-decoration:none;}
</style>
</head>
<body>

<div class="confetti-wrap" id="confetti"></div>

<header>
<div class="hdr">
  <a class="logo" href="index.html">
    <svg width="30" height="30" viewBox="0 0 36 36"><circle cx="18" cy="18" r="17" fill="none" stroke="#d4a882" stroke-width="1.2"/><circle cx="18" cy="18" r="13.5" fill="none" stroke="#e8e2d8" stroke-width=".6" stroke-dasharray="2.5 3.5"/><text x="18" y="23.5" text-anchor="middle" font-family="Cormorant Garamond,serif" font-size="18" fill="#b07355" font-style="italic">E</text></svg>
    <div class="logo-text"><span class="ln">estiloartesanal.emma</span><span class="ls">confirmación</span></div>
  </a>
</div>
</header>

<main>
<div class="status-card" id="status-card">
  <!-- filled by JS -->
</div>
</main>

<footer>
<p>© 2026 · <a href="index.html">estiloartesanal.emma</a> · Calle 43 N° 4364 · La Plata</p>
</footer>

<script>
function getParam(k){return new URLSearchParams(window.location.search).get(k);}

const via       = getParam('via');         // 'ig' = coordinar por IG
const mpStatus  = getParam('collection_status') || getParam('status'); // Mercado Pago
const pedido    = JSON.parse(sessionStorage.getItem('pedido')||'{}');

function renderSuccess(){
  spawnConfetti();
  document.getElementById('status-card').innerHTML = `
    <div class="status-top">
      <div class="status-icon success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 15.01 9 12.01"/></svg>
      </div>
      <h1>¡Pedido <em>confirmado!</em></h1>
      <p>Tu pedido fue recibido. En breve Emma se va a contactar para coordinar el retiro.</p>
    </div>
    ${orderBlock()}
    <div class="status-pickup">
      <div class="pickup-header">
        <div class="pickup-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div><strong>Punto de retiro</strong><span>Con cita previa — te escribimos pronto</span></div>
      </div>
      <div class="pickup-info">
        📍 Calle 43 N° 4364, La Plata · Buenos Aires<br/>
        📱 Te contactamos por Instagram o WhatsApp para coordinar
      </div>
    </div>
    <div class="status-actions">
      <a class="btn btn-sage" href="https://instagram.com/estiloartesanal.emma" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        Seguir en Instagram
      </a>
      <a class="btn btn-outline" href="index.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        Volver al inicio
      </a>
    </div>
  `;
}

function renderIG(){
  spawnConfetti();
  document.getElementById('status-card').innerHTML = `
    <div class="status-top">
      <div class="status-icon success">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
      </div>
      <h1>¡Solicitud <em>enviada!</em></h1>
      <p>Emma recibió tu pedido. Escribile por Instagram para coordinar el retiro y el pago.</p>
    </div>
    ${orderBlock()}
    <div class="status-pickup">
      <div class="pickup-header">
        <div class="pickup-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg></div>
        <div><strong>Retiro en el taller</strong><span>Calle 43 N° 4364 · La Plata</span></div>
      </div>
      <div class="pickup-info">
        Coordinar día y hora por Instagram · Formas de pago: transferencia, efectivo o Mercado Pago
      </div>
    </div>
    <div class="status-actions">
      <a class="btn btn-ig" href="https://instagram.com/estiloartesanal.emma" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor" stroke="none"/></svg>
        Escribir a @estiloartesanal.emma
      </a>
      <a class="btn btn-outline" href="index.html">Volver al inicio</a>
    </div>
  `;
}

function renderPending(){
  document.getElementById('status-card').innerHTML = `
    <div class="status-top">
      <div class="status-icon pending">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      </div>
      <h1>Pago <em>pendiente</em></h1>
      <p>Tu pago está siendo procesado. Te avisamos cuando se confirme, normalmente en pocas horas.</p>
    </div>
    ${orderBlock()}
    <div class="status-actions">
      <a class="btn btn-sage" href="https://instagram.com/estiloartesanal.emma" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/></svg>
        Consultar estado por Instagram
      </a>
      <a class="btn btn-outline" href="index.html">Volver al inicio</a>
    </div>
  `;
}

function renderError(){
  document.getElementById('status-card').innerHTML = `
    <div class="status-top">
      <div class="status-icon error">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
      </div>
      <h1>Pago <em>no procesado</em></h1>
      <p>Hubo un problema con el pago. Podés intentar de nuevo o coordinar por Instagram directamente.</p>
    </div>
    <div class="status-actions" style="padding:1.5rem 2.5rem 2rem;">
      <a class="btn btn-sage" href="javascript:history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Intentar de nuevo
      </a>
      <a class="btn btn-ig" href="https://instagram.com/estiloartesanal.emma" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/></svg>
        Coordinar por Instagram
      </a>
      <a class="btn btn-outline" href="index.html">Volver al inicio</a>
    </div>
  `;
}

function orderBlock(){
  if(!pedido.nombre && !pedido.producto) return '';
  return `
    <div class="status-order">
      <p class="order-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/></svg>Detalle del pedido</p>
      ${pedido.nombre ? `<div class="order-row"><span>Comprador/a</span><strong>${pedido.nombre}</strong></div>` : ''}
      ${pedido.producto ? `<div class="order-row"><span>Producto</span><strong>${pedido.producto}</strong></div>` : ''}
      ${pedido.precio ? `<div class="order-row"><span>Total</span><strong>${pedido.precio}</strong></div>` : ''}
    </div>
  `;
}

function spawnConfetti(){
  const colors = ['#8fa882','#d4a882','#b07355','#5a7050','#ede5d8'];
  const wrap = document.getElementById('confetti');
  for(let i=0;i<55;i++){
    const c = document.createElement('div');
    c.className = 'confetti-piece';
    c.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${2+Math.random()*2.5}s;
      animation-delay:${Math.random()*.8}s;
    `;
    wrap.appendChild(c);
  }
  setTimeout(()=>wrap.remove(), 5000);
}

// Determinar qué renderizar
if(via === 'ig'){
  renderIG();
} else if(mpStatus === 'approved'){
  renderSuccess();
} else if(mpStatus === 'pending' || mpStatus === 'in_process'){
  renderPending();
} else if(mpStatus === 'rejected' || mpStatus === 'cancelled'){
  renderError();
} else {
  // Sin parámetros — estado genérico exitoso (ej: llegó desde MP sin params)
  renderSuccess();
}

// Limpiar sessionStorage después de usar
sessionStorage.removeItem('pedido');

// Actualizar URL del backend en server.js también:
// back_urls.success = "https://dsd228.github.io/estiloartesanal.emma/confirmacion.html?status=approved"
// back_urls.failure = "https://dsd228.github.io/estiloartesanal.emma/confirmacion.html?status=rejected"
// back_urls.pending = "https://dsd228.github.io/estiloartesanal.emma/confirmacion.html?status=pending"
</script>
</body>
</html>
